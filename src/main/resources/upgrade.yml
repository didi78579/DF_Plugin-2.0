    fire-protection-per-level: 0.4
    blast-protection-per-level: 0.4
  pickaxe:
    efficiency-per-level: 0.5
    unbreaking-per-level: 0.5
  shovel:
    efficiency-per-level: 0.5
    unbreaking-per-level: 0.5
  axe:
    efficiency-per-level: 0.5
    unbreaking-per-level: 0.5
  hoe:
    efficiency-per-level: 0.5.
    unbreaking-per-level: 0.5
  fishing_rod:
    unbreaking-per-level: 0.5
    lure-per-level: 0.5
    luck_of_the_sea-per-level: 0.5
  shield:
    unbreaking-per-level: 1.0
